version: 2

updates:
  # Keep NuGet dependencies up to date (Vortice.*, Nerdbank.GitVersioning, etc.)
  - package-ecosystem: nuget
    directory: /src
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Keep GitHub Actions up to date (actions/checkout, actions/setup-dotnet, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
