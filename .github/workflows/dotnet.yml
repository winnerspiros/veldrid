name: Veldrid CI build

# CI triggers:
#   - Every push to any branch (catches issues early on feature branches)
#   - Every pull request (gate merges)
#   - Tag creation (triggers NuGet publish + GitHub Release)
#
# Platform coverage:
#   The library targets net10.0 — a single cross-platform binary.
#   Backend-specific code paths are validated by each platform's CI:
#   - Windows:  D3D11, D3D12, Vulkan, OpenGL compilation
#   - Linux:    Vulkan, OpenGL, OpenGL ES compilation
#   - macOS:    Metal compilation
#   - Android:  Vulkan/OpenGL ES compilation (net10.0-android TFM)
#   - iOS:      Metal/OpenGL ES compilation  (net10.0-ios TFM)
#
# The Android and iOS jobs override TargetFramework on the command line so the
# main Veldrid.csproj (which stays net10.0) is recompiled for each mobile TFM.
# This catches any API-availability regressions without needing a real device.

on:
  create: # when tags are created
  push:
    branches: [ '**' ]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to save CI minutes
# and give faster feedback. Tag-triggered runs are kept distinct so
# release publishing isn't cancelled by subsequent commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build_windows:
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
      packages: write   # for GitHub Packages publish

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Build Packages
      run: dotnet pack src -c Release
    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nupkgs-${{ github.run_id }}-${{ github.sha }}
        path: bin\Packages\Release\ppy.*.nupkg
        if-no-files-found: error
    - name: Publish to GitHub Packages
      if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
      run: dotnet nuget push bin\Packages\Release\ppy.*.nupkg -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  build_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Check for vulnerable packages
      run: |
        output=$(dotnet list src package --vulnerable --include-transitive 2>&1)
        echo "$output"
        if echo "$output" | grep -q "has the following vulnerable packages"; then
          echo "::error::Vulnerable NuGet packages detected — check the output above and update the affected packages."
          exit 1
        fi
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release

  build_macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release

  # Compile Veldrid for net10.0-android to catch Android-specific API regressions
  # (missing Vulkan symbols, broken Android surface code, etc.) without a device.
  build_android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install Android workload
      run: dotnet workload install android
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-android-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-android-nuget-
    - name: Restore dependencies (Android)
      # Step 1: restore Veldrid for net10.0-android.  NuGet recurses into project
      # references (MetalBindings, OpenGLBindings) and writes net10.0-android into
      # their project.assets.json — even though GlobalPropertiesToRemove=TargetFramework
      # is set on those <ProjectReference> items (that metadata is honored at BUILD time
      # by MSBuild but is ignored by NuGet during restore).
      run: dotnet restore src/Veldrid -p:TargetFramework=net10.0-android
    - name: Re-restore sub-libraries (Android)
      # Step 2: restore MetalBindings and OpenGLBindings with their own declared TFM
      # (net10.0) to overwrite the net10.0-android entries NuGet wrote above.  After
      # this step their project.assets.json contain "net10.0", matching what MSBuild
      # will build them as when GlobalPropertiesToRemove strips the android TFM.
      run: |
        dotnet restore src/Veldrid.MetalBindings
        dotnet restore src/Veldrid.OpenGLBindings
    - name: Build (Android)
      run: dotnet build --no-restore src/Veldrid -c Release -p:TargetFramework=net10.0-android -p:TreatWarningsAsErrors=true

  # Compile Veldrid for net10.0-ios to catch iOS/Metal-specific API regressions
  # (Metal shader includes, iOS surface extensions, etc.) without a device.
  build_ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install iOS workload
      run: dotnet workload install ios
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-ios-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-ios-nuget-
    - name: Restore dependencies (iOS)
      # Step 1: restore Veldrid for net10.0-ios.  NuGet recurses into project
      # references (MetalBindings, OpenGLBindings) and writes net10.0-ios into
      # their project.assets.json — even though GlobalPropertiesToRemove=TargetFramework
      # is set on those <ProjectReference> items (that metadata is honored at BUILD time
      # by MSBuild but is ignored by NuGet during restore).
      run: dotnet restore src/Veldrid -p:TargetFramework=net10.0-ios
    - name: Re-restore sub-libraries (iOS)
      # Step 2: restore MetalBindings and OpenGLBindings with their own declared TFM
      # (net10.0) to overwrite the net10.0-ios entries NuGet wrote above.  After
      # this step their project.assets.json contain "net10.0", matching what MSBuild
      # will build them as when GlobalPropertiesToRemove strips the ios TFM.
      run: |
        dotnet restore src/Veldrid.MetalBindings
        dotnet restore src/Veldrid.OpenGLBindings
    - name: Build (iOS)
      run: dotnet build --no-restore src/Veldrid -c Release -p:TargetFramework=net10.0-ios -p:TreatWarningsAsErrors=true

  # ──────────────────────────────────────────────────────────────────────────────
  # Smoke tests — actually instantiate a GraphicsDevice and run buffer + texture
  # round-trip tests against software / virtual adapters so bugs in the runtime
  # code paths are caught early, not just compilation errors.
  # ──────────────────────────────────────────────────────────────────────────────

  # Vulkan smoke test via lavapipe (Mesa CPU Vulkan driver — no GPU required).
  smoke_vulkan:
    runs-on: ubuntu-latest
    needs: build_linux   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Install Mesa lavapipe (CPU Vulkan ICD) and Khronos validation layers
      # mesa-vulkan-drivers provides lavapipe (lvp_icd.json) — a CPU Vulkan ICD that
      # works without a GPU, perfect for headless CI.
      # vulkan-validationlayers provides VK_LAYER_KHRONOS_validation which the smoke
      # test enables via --validation to catch Vulkan spec violations automatically.
      run: sudo apt-get install -y mesa-vulkan-drivers vulkan-validationlayers
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run Vulkan smoke test (lavapipe + Khronos validation layer)
      # Force lavapipe as the only ICD so we don't accidentally pick up a GPU
      # driver that may not be available on the GitHub-hosted runner.
      # --validation enables VK_LAYER_KHRONOS_validation which catches Vulkan spec
      # violations (invalid state, wrong barriers, missing features, etc.) at runtime.
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
          dotnet bin/Release/Veldrid.SmokeTest/net10.0/Veldrid.SmokeTest.dll --backend vulkan --validation

  # D3D11 / D3D12 smoke tests via the WARP software adapter (no GPU required).
  smoke_d3d:
    runs-on: windows-2025-vs2026
    needs: build_windows   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run D3D11 WARP smoke test
      run: dotnet bin\Release\Veldrid.SmokeTest\net10.0\Veldrid.SmokeTest.dll --backend d3d11-warp
    - name: Run D3D12 WARP smoke test
      run: dotnet bin\Release\Veldrid.SmokeTest\net10.0\Veldrid.SmokeTest.dll --backend d3d12-warp

  # Metal smoke test — runs on macOS where the Metal runtime is available.
  smoke_metal:
    runs-on: macos-latest
    needs: build_macos   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run Metal smoke test
      run: dotnet bin/Release/Veldrid.SmokeTest/net10.0/Veldrid.SmokeTest.dll --backend metal

  # ──────────────────────────────────────────────────────────────────────────────
  # Inline Vulkan benchmarks — runs on every PR and every push to the default
  # branch.  Deliberately excluded from pure feature-branch pushes to avoid
  # spending 10-20 minutes of CI budget on WIP commits that haven't been through
  # review yet.  The weekly benchmarks.yml still runs the full matrix on a
  # schedule; this job gives per-PR visibility into regressions against lavapipe.
  # ──────────────────────────────────────────────────────────────────────────────
  bench_vulkan:
    runs-on: ubuntu-latest
    needs: smoke_vulkan
    # Only run on PRs and pushes to the default branch (not every feature branch).
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Install Mesa lavapipe (CPU Vulkan ICD)
      run: sudo apt-get install -y mesa-vulkan-drivers
    - name: Restore & build benchmarks
      run: |
        dotnet restore src/Veldrid.Benchmarks
        dotnet build --no-restore src/Veldrid.Benchmarks -c Release
    - name: Run Vulkan benchmarks (lavapipe)
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
          dotnet bin/Release/Veldrid.Benchmarks/net10.0/Veldrid.Benchmarks.dll \
            --backend vulkan \
            --exporters JSON \
            --filter '*' \
            --artifacts BenchmarkResults/vulkan
    - name: Upload benchmark results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: benchmark-results-vulkan-ci-${{ github.run_number }}
        path: BenchmarkResults/vulkan/
        retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────────
  # CI report — aggregates the outcomes of every job in this workflow into a
  # single Markdown summary written to $GITHUB_STEP_SUMMARY (visible as the
  # "Summary" tab of the workflow run in the GitHub Actions UI).
  #
  # Includes:
  #   • Build status table (all platform build + smoke jobs)
  #   • Benchmark results table parsed from BenchmarkDotNet JSON artifacts
  #     (only populated when bench_vulkan ran)
  #   • Performance insights: slowest benchmark, fastest backend, % spread
  #
  # Runs with `if: always()` so it executes even when upstream jobs fail or are
  # skipped, giving the team a single-pane-of-glass view of the run.
  # ──────────────────────────────────────────────────────────────────────────────
  ci_report:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build_windows
      - build_linux
      - build_macos
      - build_android
      - build_ios
      - smoke_vulkan
      - smoke_d3d
      - smoke_metal
      - bench_vulkan
    permissions:
      contents: read

    steps:
    - name: Download benchmark artifacts (if available)
      uses: actions/download-artifact@v4
      # Continue even if the artifact doesn't exist (bench_vulkan was skipped).
      continue-on-error: true
      with:
        pattern: benchmark-results-vulkan-ci-${{ github.run_number }}
        path: /tmp/bench-artifacts
        merge-multiple: true

    - name: Generate CI summary
      env:
        # Pass each job's outcome so the Python script can render a status table.
        RESULT_BUILD_WINDOWS: ${{ needs.build_windows.result }}
        RESULT_BUILD_LINUX:   ${{ needs.build_linux.result }}
        RESULT_BUILD_MACOS:   ${{ needs.build_macos.result }}
        RESULT_BUILD_ANDROID: ${{ needs.build_android.result }}
        RESULT_BUILD_IOS:     ${{ needs.build_ios.result }}
        RESULT_SMOKE_VULKAN:  ${{ needs.smoke_vulkan.result }}
        RESULT_SMOKE_D3D:     ${{ needs.smoke_d3d.result }}
        RESULT_SMOKE_METAL:   ${{ needs.smoke_metal.result }}
        RESULT_BENCH_VULKAN:  ${{ needs.bench_vulkan.result }}
        BENCH_ARTIFACT_DIR:   /tmp/bench-artifacts
        GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        python3 - <<'PYEOF'
        import os, json, glob, re
        from datetime import datetime, timezone

        summary_path = os.environ['GITHUB_STEP_SUMMARY']

        def icon(result):
            return {'success': '✅', 'failure': '❌', 'skipped': '⏭️', 'cancelled': '🚫'}.get(result, '❓')

        def write(text=''):
            with open(summary_path, 'a') as f:
                f.write(text + '\n')

        # ── Header ───────────────────────────────────────────────────────────────
        write('# 🔬 Veldrid CI Report')
        write(f'**Run:** [{os.environ["GH_RUN_URL"]}]({os.environ["GH_RUN_URL"]})')
        write(f'**Generated:** {datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")}')
        write()

        # ── Build & smoke status ──────────────────────────────────────────────
        write('## 📦 Build & Smoke Status')
        write()
        write('| Job | Platform | Result |')
        write('|-----|----------|--------|')

        jobs = [
            ('build_windows', 'Windows (D3D11/D3D12/Vulkan/OGL)',  os.environ['RESULT_BUILD_WINDOWS']),
            ('build_linux',   'Linux (Vulkan/OGL)',                 os.environ['RESULT_BUILD_LINUX']),
            ('build_macos',   'macOS (Metal)',                      os.environ['RESULT_BUILD_MACOS']),
            ('build_android', 'Android (Vulkan/OGLES)',             os.environ['RESULT_BUILD_ANDROID']),
            ('build_ios',     'iOS (Metal/OGLES)',                  os.environ['RESULT_BUILD_IOS']),
            ('smoke_vulkan',  'Vulkan smoke (lavapipe)',            os.environ['RESULT_SMOKE_VULKAN']),
            ('smoke_d3d',     'D3D11/D3D12 smoke (WARP)',          os.environ['RESULT_SMOKE_D3D']),
            ('smoke_metal',   'Metal smoke (macOS)',                os.environ['RESULT_SMOKE_METAL']),
        ]
        all_passed = True
        for job_id, label, result in jobs:
            if result not in ('success', 'skipped'):
                all_passed = False
            write(f'| `{job_id}` | {label} | {icon(result)} `{result}` |')
        write()

        if all_passed:
            write('> 🟢 All required jobs passed.')
        else:
            write('> 🔴 One or more jobs failed — see details above.')
        write()

        # ── Benchmark results ─────────────────────────────────────────────────
        bench_result = os.environ['RESULT_BENCH_VULKAN']
        write('## ⚡ Benchmark Results (Vulkan / lavapipe)')
        write()

        if bench_result == 'skipped':
            write('> ⏭️ Benchmark job was skipped (only runs on PRs and default-branch pushes).')
            write()
            write('Run manually:')
            write('```bash')
            write('VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \\')
            write('  dotnet run --project src/Veldrid.Benchmarks -c Release -- --backend vulkan')
            write('```')
        elif bench_result != 'success':
            write(f'> ❌ Benchmark job ended with result `{bench_result}` — no results to display.')
        else:
            artifact_dir = os.environ['BENCH_ARTIFACT_DIR']
            json_files = glob.glob(f'{artifact_dir}/**/*.json', recursive=True)
            # Filter to BenchmarkDotNet full-report files (contain "Benchmarks" key).
            report_files = []
            for f in json_files:
                try:
                    with open(f) as fh:
                        data = json.load(fh)
                    if 'Benchmarks' in data:
                        report_files.append((f, data))
                except Exception:
                    pass

            if not report_files:
                write('> ⚠️ Benchmark artifact was uploaded but no BenchmarkDotNet JSON reports were found.')
            else:
                # Collect all benchmark entries across files.
                all_entries = []
                host_info = None
                for fpath, data in report_files:
                    if host_info is None:
                        host_info = data.get('HostEnvironmentInfo', {})
                    for b in data.get('Benchmarks', []):
                        stats = b.get('Statistics', {})
                        mean_ns = stats.get('Mean', None)
                        sd_ns   = stats.get('StandardDeviation', None)
                        # Extract parameter values from FullName, e.g. "(SizeInBytes: 1024)"
                        full_name = b.get('FullName', b.get('Type', '') + '.' + b.get('Method', ''))
                        # Shorten: "Veldrid.Benchmarks.BufferUpdateBenchmark.UpdateAndWait(SizeInBytes: 1024)"
                        #       → "BufferUpdateBenchmark · UpdateAndWait (SizeInBytes=1024)"
                        short = re.sub(r'^Veldrid\.Benchmarks\.', '', full_name)
                        short = re.sub(r'\(([^)]+)\)', lambda m: ' (' + m.group(1) + ')', short)
                        all_entries.append({
                            'name': short,
                            'mean_ns': mean_ns,
                            'sd_ns': sd_ns,
                        })

                def fmt_ns(ns):
                    if ns is None:
                        return 'N/A'
                    if ns < 1_000:
                        return f'{ns:.1f} ns'
                    if ns < 1_000_000:
                        return f'{ns/1_000:.2f} µs'
                    if ns < 1_000_000_000:
                        return f'{ns/1_000_000:.2f} ms'
                    return f'{ns/1_000_000_000:.3f} s'

                # Host environment summary.
                if host_info:
                    os_info  = host_info.get('OsVersion', {})
                    runtime  = host_info.get('RuntimeVersion', '')
                    cpu      = host_info.get('ProcessorName', '')
                    write(f'**Host:** {os_info.get("Value", "")} · {runtime} · {cpu}')
                    write()

                write('| Benchmark | Mean | ±StdDev |')
                write('|-----------|------|---------|')
                for e in sorted(all_entries, key=lambda x: x['name']):
                    write(f'| `{e["name"]}` | {fmt_ns(e["mean_ns"])} | {fmt_ns(e["sd_ns"])} |')
                write()

                # Insights.
                valid = [e for e in all_entries if e['mean_ns'] is not None]
                if valid:
                    slowest = max(valid, key=lambda e: e['mean_ns'])
                    fastest = min(valid, key=lambda e: e['mean_ns'])
                    write('### 💡 Insights')
                    write()
                    write(f'- **Slowest operation:** `{slowest["name"]}` at {fmt_ns(slowest["mean_ns"])} '
                          '— expected for large data transfers; dominated by host→GPU DMA bandwidth.')
                    write(f'- **Fastest operation:** `{fastest["name"]}` at {fmt_ns(fastest["mean_ns"])}.')
                    # Flag high relative noise as a potential measurement quality issue.
                    noisy = [e for e in valid if e['sd_ns'] and e['mean_ns'] > 0 and
                             e['sd_ns'] / e['mean_ns'] > 0.10]
                    if noisy:
                        write(f'- **High variance (>10% σ/mean):** '
                              + ', '.join(f'`{e["name"]}`' for e in noisy)
                              + ' — consider re-running on a quieter runner or increasing IterationCount.')
                    write()
                    write('> 📌 These numbers reflect **CPU-side API overhead** on lavapipe (software Vulkan).')
                    write('> Absolute values are not meaningful for GPU throughput; use them to track')
                    write('> **regressions** relative to previous runs on the same runner type.')

        write()
        write('---')
        write('*Generated by the `ci_report` job in `.github/workflows/dotnet.yml`*')
        PYEOF
