name: Veldrid CI build

# CI triggers:
#   - Every push to any branch (catches issues early on feature branches)
#   - Every pull request (gate merges)
#   - Tag creation (triggers NuGet publish + GitHub Release)
#
# Platform coverage:
#   The library targets net10.0 — a single cross-platform binary.
#   Backend-specific code paths are validated by each platform's CI:
#   - Windows:  D3D11, D3D12, Vulkan, OpenGL compilation
#   - Linux:    Vulkan, OpenGL, OpenGL ES compilation
#   - macOS:    Metal compilation
#   - Android:  Vulkan/OpenGL ES compilation (net10.0-android TFM)
#   - iOS:      Metal/OpenGL ES compilation  (net10.0-ios TFM)
#
# The Android and iOS jobs override TargetFramework on the command line so the
# main Veldrid.csproj (which stays net10.0) is recompiled for each mobile TFM.
# This catches any API-availability regressions without needing a real device.

on:
  create: # when tags are created
  push:
    branches: [ '**' ]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to save CI minutes
# and give faster feedback. Tag-triggered runs are kept distinct so
# release publishing isn't cancelled by subsequent commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write   # for GitHub Packages publish

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Build Packages
      run: dotnet pack src -c Release
    - name: Upload package artifacts
      uses: actions/upload-artifact@v6
      with:
        name: nupkgs-${{ github.run_id }}-${{ github.sha }}
        path: bin\Packages\Release\ppy.*.nupkg
        if-no-files-found: error
    - name: Publish to GitHub Packages
      if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
      run: dotnet nuget push bin\Packages\Release\ppy.*.nupkg -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  build_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Check for vulnerable packages
      run: |
        output=$(dotnet list src package --vulnerable --include-transitive 2>&1)
        echo "$output"
        if echo "$output" | grep -q "has the following vulnerable packages"; then
          echo "::error::Vulnerable NuGet packages detected — check the output above and update the affected packages."
          exit 1
        fi
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release

  build_macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release

  # Compile Veldrid for net10.0-android to catch Android-specific API regressions
  # (missing Vulkan symbols, broken Android surface code, etc.) without a device.
  build_android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install Android workload
      run: dotnet workload install android
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-android-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-android-nuget-
    - name: Restore dependencies (Android)
      run: dotnet restore src -p:TargetFramework=net10.0-android
    - name: Build (Android)
      run: dotnet build --no-restore src -c Release -p:TargetFramework=net10.0-android -p:TreatWarningsAsErrors=true

  # Compile Veldrid for net10.0-ios to catch iOS/Metal-specific API regressions
  # (Metal shader includes, iOS surface extensions, etc.) without a device.
  build_ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install iOS workload
      run: dotnet workload install ios
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-ios-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-ios-nuget-
    - name: Restore dependencies (iOS)
      run: dotnet restore src -p:TargetFramework=net10.0-ios
    - name: Build (iOS)
      run: dotnet build --no-restore src -c Release -p:TargetFramework=net10.0-ios -p:TreatWarningsAsErrors=true

  # ──────────────────────────────────────────────────────────────────────────────
  # Smoke tests — actually instantiate a GraphicsDevice and run buffer + texture
  # round-trip tests against software / virtual adapters so bugs in the runtime
  # code paths are caught early, not just compilation errors.
  # ──────────────────────────────────────────────────────────────────────────────

  # Vulkan smoke test via lavapipe (Mesa CPU Vulkan driver — no GPU required).
  smoke_vulkan:
    runs-on: ubuntu-latest
    needs: build_linux   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Install Mesa lavapipe (CPU Vulkan ICD) and Khronos validation layers
      # mesa-vulkan-drivers provides lavapipe (lvp_icd.json) — a CPU Vulkan ICD that
      # works without a GPU, perfect for headless CI.
      # vulkan-validationlayers provides VK_LAYER_KHRONOS_validation which the smoke
      # test enables via --validation to catch Vulkan spec violations automatically.
      run: sudo apt-get install -y mesa-vulkan-drivers vulkan-validationlayers
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run Vulkan smoke test (lavapipe + Khronos validation layer)
      # Force lavapipe as the only ICD so we don't accidentally pick up a GPU
      # driver that may not be available on the GitHub-hosted runner.
      # --validation enables VK_LAYER_KHRONOS_validation which catches Vulkan spec
      # violations (invalid state, wrong barriers, missing features, etc.) at runtime.
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
          dotnet bin/Release/Veldrid.SmokeTest/net10.0/Veldrid.SmokeTest.dll --backend vulkan --validation

  # D3D11 / D3D12 smoke tests via the WARP software adapter (no GPU required).
  smoke_d3d:
    runs-on: windows-latest
    needs: build_windows   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run D3D11 WARP smoke test
      run: dotnet bin\Release\Veldrid.SmokeTest\net10.0\Veldrid.SmokeTest.dll --backend d3d11-warp
    - name: Run D3D12 WARP smoke test
      run: dotnet bin\Release\Veldrid.SmokeTest\net10.0\Veldrid.SmokeTest.dll --backend d3d12-warp

  # Metal smoke test — runs on macOS where the Metal runtime is available.
  smoke_metal:
    runs-on: macos-latest
    needs: build_macos   # ensure it compiles before we try to run it

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore & build smoke test
      run: |
        dotnet restore src/Veldrid.SmokeTest
        dotnet build --no-restore src/Veldrid.SmokeTest -c Release
    - name: Run Metal smoke test
      run: dotnet bin/Release/Veldrid.SmokeTest/net10.0/Veldrid.SmokeTest.dll --backend metal
