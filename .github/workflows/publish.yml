name: Publish NuGet Packages

# Manual one-click publish to GitHub Packages.
# Trigger via the Actions tab → select this workflow → "Run workflow".
#
# GitHub Packages registry
# ────────────────────────
#   https://nuget.pkg.github.com/<owner>/index.json
#   Consumers must add this source and authenticate with a PAT that has
#   read:packages scope (public packages can be consumed without auth).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write   # push to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required by Nerdbank.GitVersioning to compute
          # the correct version number from commit depth.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Patch version.json so every manual run produces a unique, monotonically
      # increasing package version. We keep Major.Minor from version.json and
      # use the workflow run number as the patch component, e.g. "4.9.42".
      # PublicRelease=true is passed to Nerdbank.GitVersioning at build/pack
      # time so it doesn't append its own "-g<sha>" prerelease tag, giving a
      # clean version that NuGet treats as a stable release.
      - name: Compute unique package version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content version.json -Raw
          # Extract Major.Minor[.Patch] from version.json's "version" field via
          # regex so the // comments don't trip up ConvertFrom-Json.
          $match = [regex]::Match($json, '"version"\s*:\s*"([^"-]+)')
          if (-not $match.Success) { throw "Could not parse version from version.json" }
          $baseVersion = $match.Groups[1].Value.Trim('.')   # e.g. "4.9"
          $newVersion = "$baseVersion.${{ github.run_number }}"
          Write-Host "Setting version to: $newVersion"
          $patched = [regex]::Replace($json, '"version"\s*:\s*"[^"]*"', '"version": "' + $newVersion + '"')
          Set-Content -Path version.json -Value $patched -NoNewline
          "PACKAGE_VERSION=$newVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore dependencies
        run: dotnet restore src

      - name: Build
        run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true -p:PublicRelease=true

      - name: Pack
        run: dotnet pack --no-build src -c Release -p:PublicRelease=true

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nupkgs-${{ github.run_id }}-${{ github.sha }}
          path: bin\Packages\Release\ppy.*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push bin\Packages\Release\ppy.*.nupkg
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
