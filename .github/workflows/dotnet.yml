name: Veldrid CI build

# CI triggers:
#   - Every push to any branch (catches issues early on feature branches)
#   - Every pull request (gate merges)
#   - Tag creation (triggers NuGet publish + GitHub Release)
#
# Platform coverage:
#   The library targets net10.0 — a single cross-platform binary.
#   Backend-specific code paths are validated by each platform's CI:
#   - Windows:  D3D11, D3D12, Vulkan, OpenGL compilation
#   - Linux:    Vulkan, OpenGL, OpenGL ES compilation (covers Android backends)
#   - macOS:    Metal compilation (covers iOS backends)
#   iOS and Android use the same compiled binary at runtime.

on:
  create: # when tags are created
  push:
    branches: [ '**' ]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same branch / PR to save CI minutes
# and give faster feedback. Tag-triggered runs are kept distinct so
# release publishing isn't cancelled by subsequent commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write   # for GitHub Packages publish

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Build Packages
      run: dotnet pack src -c Release
    - name: Upload package artifacts
      uses: actions/upload-artifact@v6
      with:
        name: nupkgs-${{ github.run_id }}-${{ github.sha }}
        path: bin\Packages\Release\ppy.*.nupkg
        if-no-files-found: error
    - name: Publish to GitHub Packages
      if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
      run: dotnet nuget push bin\Packages\Release\ppy.*.nupkg -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

  build_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release

  build_macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore src
    - name: Build
      run: dotnet build --no-restore src -c Release -p:TreatWarningsAsErrors=true
    - name: Verify NuGet Packages
      run: dotnet pack --no-build src -c Release
